spring.application.name=PilotLogbook

# Secrets and credentials are read from .env (gitignored) for local dev
# In Docker they are injected as real env vars by docker-compose and override these defaults
spring.config.import=optional:file:.env[.properties]

# ===== DataSource (PostgreSQL) =====
spring.datasource.url=jdbc:postgresql://localhost:5432/pilotlogbook
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:pilot}
spring.datasource.password=${DB_PASSWORD:pilot_password}

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== Server =====
server.port=8080

# ===== JWT =====
jwt.expiration-ms=86400000
jwt.secret=${JWT_SECRET}

# ==== Weather API ====
weather.api.base-url=https://aviationweather.gov/api/data
weather.api.timeout-ms=5000

# ==== Airport Data API ====
airport.api.base-url=https://api.api-ninjas.com/v1/airports
airport.api.timeout-ms=5000
airport.api.key=${AIRPORT_API_KEY}

# ==== Async Executor ====
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4