services:
  postgres:
    image: postgres:16-alpine
    container_name: pilotlogbook-postgres
    environment:
      POSTGRES_DB: pilotlogbook
      POSTGRES_USER: pilot
      POSTGRES_PASSWORD: pilot_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pilot" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: pilotlogbook-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pilotlogbook
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

