services:
  postgres:
    image: postgres:16-alpine
    container_name: pilotlogbook-postgres
    environment:
      POSTGRES_DB: pilotlogbook
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: pilotlogbook-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pilotlogbook
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AIRPORT_API_KEY: ${AIRPORT_API_KEY}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    container_name: pilotlogbook-frontend
    ports:
      - "4173:4173"
    depends_on:
      - backend
volumes:
  postgres_data: